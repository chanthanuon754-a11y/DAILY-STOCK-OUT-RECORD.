<style>

.form-container{ max-width: 1050px; margin: auto; padding: 45px; border-radius: 30px; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 25px 70px rgba(0,0,0,0.5), 0 0 45px rgba(59,130,246,0.1); position: relative; }
.logo-container{ text-align: center; margin-bottom: 25px; }
.logo-container img{ max-width: 180px; height: auto; background: transparent; }
.main-title{ text-align: center; font-size: 42px; font-weight: 900; letter-spacing: 2px; background: linear-gradient(135deg, #38bdf8, #2563eb, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 50px; position: relative; }
.main-title::after{ content: ""; position: absolute; left: 50%; bottom: -16px; transform: translateX(-50%); width: 260px; height: 6px; border-radius: 50px; background: linear-gradient(90deg, #38bdf8, #2563eb, #06b6d4); box-shadow: 0 0 25px rgba(59,130,246,0.5); }
.section-card { border-radius: 20px; padding: 30px; margin-bottom: 35px; border: 1px solid rgba(255, 255, 255, 0.05); }

label{ margin-bottom: 12px; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
input, select{ width: 100%; padding: 16px 18px; border-radius: 12px; color: #ffffff; font-size: 14px; font-weight: 500; box-sizing: border-box; }

<script>
var submitted = false;
let productDatabase = {};

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz09AuqFPmUgE3mLMHgCC_JmOFGVwaTHwtBX68-Qavt5FePJhjWuBhhkeWOha0cU-NW/exec";
const ADMIN_PASSWORD = "1234";

// 📡 ទិន្នន័យ Telegram ពិតប្រាកដរបស់បង ត្រូវបានកំណត់ចូលប្រព័ន្ធរួចរាល់ជាមួយ ID Supergroup ថ្មី
const TELEGRAM_BOT_TOKEN = "8758001195:AAFs0wfRQMCjCDa5kdu7kHyxvYpJnPHfaA4";
const TELEGRAM_CHAT_ID = "-1003971701236"; // 👈 កែសម្រួលដាក់លេខ ID Supergroup ថ្មីរួចរាល់

function toggleAdminPanel() {
    const adminPanel = document.getElementById("adminPanel");
    if (adminPanel.style.display === "block") { adminPanel.style.display = "none"; return; }
    
    const pass = prompt("🔑 សូមបញ្ចូលលេខសម្ងាត់ដើម្បីបើកផ្ទាំងគ្រប់គ្រង៖");
    if (pass === ADMIN_PASSWORD) {
        adminPanel.style.display = "block";
        adminPanel.scrollIntoView({ behavior: 'smooth' });
    } else if (pass !== null) { alert("❌ លេខសម្ងាត់មិនត្រឹមត្រូវទេ!"); }
}

function exportMonthlyReport() {
    const btn = document.getElementById("btnExport");
    btn.disabled = true;
    btn.textContent = "⏳ កំពុងគណនា និងបូកសរុបទិន្នន័យប្រចាំខែ...";
    
    fetch(APPS_SCRIPT_URL + "?export=true")
    .then(res => res.json())
    .then(rows => {
        if (!rows || rows.length <= 1) { alert("❌ មិនទាន់មានទិន្នន័យសម្រាប់ស្រង់ឡើយ!"); return; }
        
        const headers = rows[0];
        const idxMonth = headers.findIndex(h => h.toString().toLowerCase().includes("month"));
        const idxCode = headers.findIndex(h => h.toString().toLowerCase().includes("code bc") || h.toString().toLowerCase().includes("codebc") || h.toString().toLowerCase().includes("2001095029"));
        const idxProdName = headers.findIndex(h => h.toString().toLowerCase().includes("product") || h.toString().toLowerCase().includes("1718200836"));
        const idxQty = headers.findIndex(h => h.toString().toLowerCase().includes("qty") || h.toString().toLowerCase().includes("2116288745"));
        
        if (idxMonth === -1 || idxCode === -1 || idxProdName === -1 || idxQty === -1) {
            alert("❌ ប្រព័ន្ធរកមិនឃើញជួរឈរ (Month, Code BC, Product Name, QTY) ឡើយ!"); return;
        }

        let summaryMap = {};
        for (let i = 1; i < rows.length; i++) {
            let row = rows[i];
            let month = row[idxMonth] ? row[idxMonth].toString().trim() : "Unknown";
            let code = row[idxCode] ? row[idxCode].toString().trim() : "No Code";
            let prodName = row[idxProdName] ? row[idxProdName].toString().trim() : "No Name";
            let qty = parseFloat(row[idxQty]) || 0;
            
            if (!month || (!code && !prodName)) continue;
            
            let key = `${month}|||${code}|||${prodName}`;
            summaryMap[key] = (summaryMap[key] || 0) + qty;
        }

        let csvContent = "\uFEFF"; 
        csvContent += "======= របាយការណ៍សង្ខេបការប្រើប្រាស់ប្រចាំខែ (SUMMARY REPORT) =======\r\n";
        csvContent += "Month (ខែ),Code BC MM co., (កូដផលិតផល),Product Name (ឈ្មោះផលិតផល),Total QTY (ចំនួនប្រើប្រាស់សរុប)\r\n";
        
        let sortedKeys = Object.keys(summaryMap).sort((a, b) => (parseInt(a.split("|||")[0])||0) - (parseInt(b.split("|||")[0])||0));
        sortedKeys.forEach(key => {
            let parts = key.split("|||");
            let safeP = parts[2].includes(",") ? `"${parts[2]}"` : parts[2];
            let safeC = parts[1].includes(",") ? `"${parts[1]}"` : parts[1];
            csvContent += `${parts[0]},'${safeC},${safeP},${summaryMap[key]}\r\n`;
        });
        
        csvContent += "\r\n\r\n======= ទិន្នន័យលម្អិតដើមទាំងអស់ (ALL DETAILED RAW DATA) =======\r\n";
        rows.forEach(row => {
            csvContent += row.map(val => {
                let text = val ? val.toString().replace(/"/g, '""') : "";
                return text.includes(",") || text.includes("\n") ? `"${text}"` : text;
            }).join(",") + "\r\n";
        });
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `Stock_Out_Summary_Report_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
        alert("✅ បានទាញយករបាយការណ៍បូកសរុបប្រចាំខែរួចរាល់!");
    })
    .catch(err => { alert("❌ មានបញ្ហាក្នុងការទាញទិន្នន័យ៖ " + err); })
    .finally(() => { btn.disabled = false; btn.textContent = "📥 EXPORT MONTHLY SUMMARY REPORT"; });
}

function filterProducts() {
    const keyword = document.getElementById("productSearchInput").value.toLowerCase();
    const select = document.getElementById("productSelect");
    
    select.innerHTML = '<option value="">-- Select Product --</option>';
    
    for (const key in productDatabase) {
        if (productDatabase.hasOwnProperty(key)) {
            const code = productDatabase[key].code.toLowerCase();
            const name = key.toLowerCase();
            
            if (name.includes(keyword) || code.includes(keyword)) {
                const opt = document.createElement("option");
                opt.value = key;
                opt.textContent = `${key} [${productDatabase[key].code}]`;
                select.appendChild(opt);
            }
        }
    }
}

function filterAdminDeleteProducts() {
    const keyword = document.getElementById("adminDeleteSearchInput").value.toLowerCase();
    const select = document.getElementById("adminProductDeleteSelect");
    select.innerHTML = '<option value="">-- ជ្រើសរើសផលិតផលដើម្បីលុប --</option>';
    
    for (const key in productDatabase) {
        if (productDatabase.hasOwnProperty(key)) {
            if (key.toLowerCase().includes(keyword) || productDatabase[key].code.toLowerCase().includes(keyword)) {
                const opt = document.createElement("option");

            }

}

function fetchLiveProducts() {
    fetch(APPS_SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            productDatabase = data;
            renderProductDropdowns();
            document.getElementById("loadingStatus").textContent = "✓ Connected. Live Database Synchronized!";
            document.getElementById("loadingStatus").style.color = "#10b981";
        }).catch(err => {
            document.getElementById("loadingStatus").textContent = "Failed to sync live database.";
            document.getElementById("loadingStatus").style.color = "#ef4444";
        });
}

function renderProductDropdowns() {
    const productSelect = document.getElementById("productSelect");
    const adminDeleteSelect = document.getElementById("adminProductDeleteSelect");
    
    productSelect.innerHTML = '<option value="">-- Select Product --</option>';
    adminDeleteSelect.innerHTML = '<option value="">-- ជ្រើសរើសផលិតផលដើម្បីលុប --</option>';
    
    for (const key in productDatabase) {
        if (productDatabase.hasOwnProperty(key)) {
            const opt1 = document.createElement("option");
            opt1.value = key; 
            opt1.textContent = `${key} [${productDatabase[key].code}]`;
            productSelect.appendChild(opt1);
            
            const opt2 = document.createElement("option");
            opt2.value = key; opt2.textContent = key;
            adminDeleteSelect.appendChild(opt2);
        }
    }
}

function handleProductAction(actionType) {
    const btnAdd = document.getElementById("btnAddProd");
    const btnDel = document.getElementById("btnDelProd");
    const formData = new URLSearchParams();
    
    if (actionType === 'add') {
        const name = document.getElementById("newProdName").value.trim();
        const code = document.getElementById("newProdCode").value.trim();
        const uom = document.getElementById("newProdUom").value.trim();
        if (!name || !code || !uom) { alert("⚠️ សូមបំពេញព័ត៌មានផលិតផលថ្មីឱ្យបានគ្រប់គ្រាន់!"); return; }
        
        btnAdd.disabled = true; if(btnDel) btnDel.disabled = true;
        btnAdd.textContent = "⏳ កំពុងបញ្ចូល...";
        formData.append("action", "add"); formData.append("new_name", name); formData.append("new_code", code); formData.append("new_uom", uom);
        
    } else if (actionType === 'delete') {
        const selectedProduct = document.getElementById("adminProductDeleteSelect").value;
        if (!selectedProduct) { alert("⚠️ សូមជ្រើសរើសផលិតផលជាមុនសិន!"); return; }
        if (!confirm("⚠️ តើអ្នកប្រាកដជាចង់លុបផលិតផល '" + selectedProduct + "' នេះមែនទេ?")) { return; }
        
        btnAdd.disabled = true; btnDel.disabled = true; btnDel.textContent = "⏳ កំពុងលុប...";
        formData.append("action", "delete"); formData.append("delete_name", selectedProduct);
    }

    fetch(APPS_SCRIPT_URL, { method: "POST", body: formData, headers: { "Content-Type": "application/x-www-form-urlencoded" } })
    .then(res => res.text())
    .then(textData => {
        const resData = JSON.parse(textData);
        if (resData.status === "success") {
            if (actionType === 'add') {
                alert("✅ បានបន្ថែមផលិតផលថ្មីដោយជោគជ័យ!");
                document.getElementById("newProdName").value = ""; document.getElementById("newProdCode").value = ""; document.getElementById("newProdUom").value = "";
            } else {
                alert("🗑️ បានលុបផលិតផលរួចរាល់!");
                document.getElementById("productSelect").value = ""; document.getElementById("codeBC").value = ""; document.getElementById("uomInput").value = "";
            }
            document.getElementById("productSearchInput").value = "";
            document.getElementById("adminDeleteSearchInput").value = "";
            fetchLiveProducts();
        } else { alert(resData.message); }
    })
    .catch(err => { alert("❌ មានបញ្ហាប្រព័ន្ធតភ្ជាប់!"); })
    .finally(() => { btnAdd.disabled = false; if(btnDel) btnDel.disabled = false; btnAdd.textContent = "➕ ADD NEW PRODUCT"; if(btnDel) btnDel.textContent = "❌ DELETE SELECTED PRODUCT"; });
}

// 🆕 អនុគមន៍បញ្ជូនទិន្នន័យស្រង់យកតែចំណុចសំខាន់ៗផ្ញើទៅកាន់ Telegram Bot
function sendTelegramMessage() {
    if (typeof TELEGRAM_BOT_TOKEN === 'undefined' || typeof TELEGRAM_CHAT_ID === 'undefined' || !TELEGRAM_BOT_TOKEN || !TELEGRAM_CHAT_ID) {
        console.warn("⚠️ Telegram bot token or chat ID is missing or not declared.");
        return;
    }

    const nameTeam = document.getElementById("nameTeam").value;
    const dateStockOut = document.getElementById("dateStockOut").value;
    const productName = document.getElementById("productSelect").value;
    const serial = document.getElementById("serialInput").value || "N/A";
    const macSerial = document.getElementById("macInput").value || "N/A";
    const status = document.getElementById("statusSelect").value;
    const qty = document.getElementById("qtyInput").value;
    const ticket = document.getElementById("ticketInput").value || "N/A";
    const remark = document.getElementById("remarkInput").value || "N/A";

    // រៀបចំជាសារទម្រង់ស្អាត (HTML style)
    const message = `📦 <b>DAILY STOCK OUT RECORD</b> 📦\n\n` +
                    `👤 <b>Name Team:</b> ${nameTeam}\n` +
                    `📅 <b>Date stock out:</b> ${dateStockOut}\n` +
                    `🏷️ <b>Product Name:</b> ${productName}\n` +
                    `🔢 <b>Serial:</b> ${serial}\n` +
                    `🌐 <b>Mac serial:</b> ${macSerial}\n` +
                    `📊 <b>QTY-New/Old/Broken:</b> ${qty} (${status})\n` +
                    `🎫 <b>Customer's Ticket:</b> ${ticket}\n` +
                    `📝 <b>Remark:</b> ${remark}`;

    const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
    
    fetch(url, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            chat_id: TELEGRAM_CHAT_ID,
            text: message,
            parse_mode: "HTML"
        })
    })
    .then(response => {
        if (!response.ok) {
            console.error("Telegram API Response Error:", response.statusText);
        }
    })
    .catch(err => {
        console.error("Telegram Network Error:", err);
    });
}
